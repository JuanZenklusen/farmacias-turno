name: Actualizar farmacias

on:

  workflow_dispatch:

  schedule:
    - cron: '0 */6 * * *'

jobs:

  scrape:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar
        run: npm install

      - name: Ejecutar scraper
        run: node scrape.js

      - name: Commit JSON
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add farmacias.json
          git commit -m "update farmacias" || echo "sin cambios"
          git push
